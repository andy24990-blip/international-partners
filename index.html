<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hợp tác Quốc tế - Đại học Huế</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <header class="bg-blue-900 text-white p-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-wide">Hệ thống Quản lý Đối tác Quốc tế</h1>
                <p class="text-blue-200 mt-1">Đại học Huế | Phiên bản trực tuyến 2026</p>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-sm opacity-80">Dữ liệu MOU/MOA</p>
                <p class="font-semibold text-orange-400">Giai đoạn 2021 - 2025</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mt-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-600">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Tổng số Đối tác</h3>
                <p class="text-4xl font-black text-gray-800 mt-2" id="totalPartners">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Quốc gia</h3>
                <p class="text-4xl font-black text-gray-800 mt-2" id="totalCountries">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-orange-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Đang hiệu lực</h3>
                <p class="text-4xl font-black text-green-600 mt-2" id="activeDocs">0</p>
            </div>
        </div>

        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="Tìm kiếm tên trường hoặc quốc gia..." class="w-full p-4 rounded-lg border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10" id="cardContainer">
            </div>
    </main>

    <footer class="bg-gray-100 py-8 text-center text-gray-500 text-sm">
        <p>© 2026 Đại học Huế - Phòng Hợp tác Quốc tế</p>
    </footer>

    <script>
        // DỮ LIỆU "RUỘT" ĐÃ ĐƯỢC NHÚNG TRỰC TIẾP
        const rawData = [
            { "name": "University and Tokiwa", "country": "Nhật Bản", "type": "MOU", "expiry": "07/06/2026", "status": "Còn hiệu lực" },
            { "name": "Osaka University of Tourism", "country": "Nhật Bản", "type": "MOU", "expiry": "21/06/2026", "status": "Còn hiệu lực" },
            { "name": "Japan Women's University", "country": "Nhật Bản", "type": "MOU", "expiry": "01/07/2026", "status": "Còn hiệu lực" },
            { "name": "Chugoku Gakuen University", "country": "Nhật Bản", "type": "MOU", "expiry": "14/09/2026", "status": "Còn hiệu lực" },
            { "name": "Bernhard Nocht Institute for Tropical Medicine", "country": "Đức", "type": "MOU", "expiry": "01/10/2026", "status": "Còn hiệu lực" },
            { "name": "Nagoya University", "country": "Nhật Bản", "type": "MOU", "expiry": "15/10/2026", "status": "Còn hiệu lực" },
            { "name": "The Thai Chamber of Commerce", "country": "Thái Lan", "type": "MOU", "expiry": "10/11/2026", "status": "Còn hiệu lực" },
            { "name": "Ghent University (Bioscience Engineering)", "country": "Bỉ", "type": "MOU", "expiry": "02/03/2027", "status": "Còn hiệu lực" },
            { "name": "Tokyo Keizai University", "country": "Nhật Bản", "type": "MOU", "expiry": "10/03/2027", "status": "Còn hiệu lực" }
        ];

        function renderCards(filter = '') {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            const filteredData = rawData.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase()) || 
                item.country.toLowerCase().includes(filter.toLowerCase())
            );

            filteredData.forEach(item => {
                const card = `
                    <div class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition border border-gray-100">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-1 rounded-full uppercase">${item.status}</span>
                            <span class="text-gray-400 font-mono text-xs">${item.type}</span>
                        </div>
                        <h3 class="font-bold text-gray-800 text-lg leading-tight mb-2 h-12 overflow-hidden">${item.name}</h3>
                        <div class="flex items-center text-sm text-gray-500 mb-4">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            ${item.country}
                        </div>
                        <div class="pt-4 border-t border-dashed border-gray-100 flex justify-between items-center">
                            <span class="text-xs text-gray-400 uppercase font-semibold">Hết hạn:</span>
                            <span class="text-sm font-bold text-blue-600">${item.expiry}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });

            // Cập nhật thống kê
            document.getElementById('totalPartners').innerText = rawData.length;
            document.getElementById('totalCountries').innerText = [...new Set(rawData.map(i => i.country))].length;
            document.getElementById('activeDocs').innerText = rawData.filter(i => i.status === 'Còn hiệu lực').length;
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderCards(e.target.value));
        renderCards();
    </script>
</body>
</html>
